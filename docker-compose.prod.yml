services:
  postgres:
    image: postgres:16-alpine
    container_name: smolsmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smolsmanager}
      POSTGRES_USER: ${POSTGRES_USER:-smols}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - smolsmanager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smols} -d ${POSTGRES_DB:-smolsmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smolsmanager_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: smolsmanager-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-smols}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smolsmanager}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - smolsmanager_net

  admin-pwa:
    build:
      context: ./admin-pwa
      dockerfile: Dockerfile.prod
    container_name: smolsmanager-admin-pwa
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"
    networks:
      - smolsmanager_net

  web:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.prod
    container_name: smolsmanager-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3001:80"
    networks:
      - smolsmanager_net

volumes:
  smolsmanager_pgdata:

networks:
  smolsmanager_net:
    driver: bridge
